<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="container py-5" style="max-width: 620px">
      <div class="wf-shell">
        <div class="wf-label mb-2">Authentication</div>
        <h1 class="h4">Register</h1>
        <div class="row g-3">
          <div class="col-md-6">
            <input class="form-control" placeholder="Name" />
          </div>
          <div class="col-md-6">
            <input class="form-control" placeholder="Username" />
          </div>
          <div class="col-12">
            <input class="form-control" placeholder="Email" />
          </div>
          <div class="col-md-6">
            <input
              class="form-control"
              type="password"
              placeholder="Password"
            />
          </div>
          <div class="col-md-6">
            <input
              class="form-control"
              type="password"
              placeholder="Confirm Password"
            />
          </div>
        </div>
        <a class="btn btn-primary mt-3 w-100" href="dashboard.html"
          >Create Account</a
        >
      </div>
    </main>
    <script src="assets/script.js"></script>
  </body>
</html>
