<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="container py-5" style="max-width: 520px">
      <div class="wf-shell">
        <div class="wf-label mb-2">Authentication</div>
        <h1 class="h4">Login</h1>
        <p class="text-muted">Simple interface only, no validation logic.</p>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" placeholder="••••••••" />
        </div>
        <a class="btn btn-primary w-100" href="dashboard.html">Sign In</a>
        <div class="mt-3">
          <a href="register.html">Go to Register</a>
        </div>
      </div>
    </main>
    <script src="assets/script.js"></script>
  </body>
</html>
