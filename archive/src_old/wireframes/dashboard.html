<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="container py-4">
      <div
        class="wf-page-header d-flex justify-content-between align-items-center"
      >
        <div>
          <div class="wf-label">Main Screen</div>
          <h1 class="h4 mb-0">Dashboard</h1>
        </div>
        <a href="index.html" class="btn btn-outline-secondary btn-sm">Home</a>
      </div>

      <div class="wf-shell mb-3">
        <div class="wf-label mb-2">Top-level Components</div>
        <span class="wf-chip">Stat Cards</span>
        <span class="wf-chip">Performance Chart</span>
        <span class="wf-chip">Recent Activity</span>
        <span class="wf-chip">Quick Actions</span>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <div class="wf-component">
            <div class="wf-label">Card</div>
            Active Experiments
          </div>
        </div>
        <div class="col-md-3">
          <div class="wf-component">
            <div class="wf-label">Card</div>
            Validated Models
          </div>
        </div>
        <div class="col-md-3">
          <div class="wf-component">
            <div class="wf-label">Card</div>
            Blueprints
          </div>
        </div>
        <div class="col-md-3">
          <div class="wf-component">
            <div class="wf-label">Card</div>
            Queue Status
          </div>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-lg-8">
          <div class="wf-component">
            <div class="wf-label">Primary Region</div>
            Equity Curve / Timeline / Status Trend
          </div>
        </div>
        <div class="col-lg-4">
          <div class="wf-stack">
            <div class="wf-component">
              <div class="wf-label">Panel</div>
              Recent Activity Feed
            </div>
            <div class="wf-component">
              <div class="wf-label">Panel</div>
              Quick Actions
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/script.js"></script>
  </body>
</html>
