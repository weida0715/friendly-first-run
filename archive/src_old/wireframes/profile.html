<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="container py-4">
      <div class="wf-page-header">
        <div class="wf-label">Main Screen</div>
        <h1 class="h4 mb-0">My Profile</h1>
      </div>

      <div class="wf-shell mb-3">
        <div class="wf-label mb-2">Top-level Components</div>
        <span class="wf-chip">Profile Summary</span>
        <span class="wf-chip">Stats</span>
        <span class="wf-chip">Activity Tabs</span>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="wf-component">Avatar + Bio + Follow Stats</div>
        </div>
        <div class="col-lg-8">
          <div class="wf-component">
            Tabs: Experiments / Models / Blueprints + Activity List
          </div>
        </div>
      </div>
    </main>
    <script src="assets/script.js"></script>
  </body>
</html>
