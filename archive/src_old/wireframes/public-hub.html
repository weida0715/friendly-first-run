<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Public Hub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="container py-4">
      <div class="wf-page-header">
        <div class="wf-label">Main Screen</div>
        <h1 class="h4 mb-0">Public Hub</h1>
      </div>

      <div class="wf-shell mb-3">
        <div class="wf-label mb-2">Top-level Components</div>
        <span class="wf-chip">Discovery Filters</span>
        <span class="wf-chip">Experiments Gallery</span>
        <span class="wf-chip">Models Gallery</span>
        <span class="wf-chip">Blueprints Gallery</span>
      </div>

      <div class="wf-component mb-3">
        <div class="wf-label">Controls</div>
        Search + Type Tabs + Tags + Sort
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="wf-component">Public Card (Experiment)</div>
        </div>
        <div class="col-lg-4">
          <div class="wf-component">Public Card (Model)</div>
        </div>
        <div class="col-lg-4">
          <div class="wf-component">Public Card (Blueprint)</div>
        </div>
      </div>
    </main>
    <script src="assets/script.js"></script>
  </body>
</html>
