<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEE Wireframe - Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="container py-4">
      <div class="wf-page-header">
        <div class="wf-label">Main Screen</div>
        <h1 class="h4 mb-0">Admin / Moderator</h1>
      </div>

      <div class="wf-shell mb-3">
        <div class="wf-label mb-2">Top-level Components</div>
        <span class="wf-chip">User Management</span>
        <span class="wf-chip">Blueprint Approvals</span>
        <span class="wf-chip">System Health</span>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="wf-component">Users Moderation Queue</div>
        </div>
        <div class="col-md-6">
          <div class="wf-component">Blueprint Approval Queue</div>
        </div>
      </div>
    </main>
    <script src="assets/script.js"></script>
  </body>
</html>
